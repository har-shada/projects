<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Todo App</title>

<style>

body{
    font-family: Arial;
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#667eea,#764ba2,#6dd5ed);
}
h2{
    font-size: 5rem;
}
.container{
    background:white;
    padding:30px;
    border-radius:15px;
    width:1500px;
    height: 1000px;
    text-align:center;

}

input{
    width:60%;
    padding:40px;
    height: 100px;
    font-size: 3rem;
}

button{
    padding:20px;
    margin:90px 5px;
    border:none;
    border-radius:6px;
    color:white;
    cursor:pointer;
    font-size: 3rem;
    width: 300px;
}

.add{background:#4CAF50;}
.show{background:#2196F3;}
.edit{background:#ff9800;}
.delete{background:#f44336;}

ul{
    list-style:none;
    padding:0;
}

li{
    /* background:#eee; */
    padding:10px;
    margin:8px 0;
    font-size: 2rem;
    display:flex;
    justify-content:space-between;
}

#message{
    margin-top:10px;
    color:green;
    font-size: 2.7rem;
}
#quote{
    font-size: 3rem;

}


button.edit {
    padding: 5px 10px;    /* smaller padding */
    font-size: 2.5rem;      /* smaller text */
    border-radius: 5px;   /* optional rounded corners */
    background-color: #ff9800;  /* orange like before */
    color: white;
    width:200px;
    height:60px;
}
button.delete {
    padding: 5px 10px;    /* smaller padding */
    font-size: 2.5rem;      /* smaller text */
    border-radius: 5px;   /* optional rounded corners */
    background-color: #d82713;  /* orange like before */
    color: white;
    width:200px;
    height:60px;
}

</style>
</head>

<body>

<div class="container">

<h2>Todo App</h2>

<div id="inputArea">
    <input id="todoInput" placeholder="Enter task">
    <br>
    <button class="add" id="addBtn">Add Todo</button>
    <button class="show" id="showBtn">Show List</button>
</div>





<p id="message"></p>

<ul id="todoList"></ul>
<p id="quote">Loading motivation...</p>

</div>

<script>

let todos = []

let input = document.getElementById("todoInput")
let addBtn = document.getElementById("addBtn")
let showBtn = document.getElementById("showBtn")
let list = document.getElementById("todoList")
let message = document.getElementById("message")

// ADD TODO
addBtn.addEventListener("click", function(){

    let value = input.value.trim()

    if(value === ""){
        return
    }

    todos.push(value)

    input.value = ""

    message.innerText = "Todo Added"

    setTimeout(function(){
        message.innerText = ""
    },1000)

})


// SHOW TODOS
showBtn.addEventListener("click", showTodos)


function showTodos(){
    // Hide the input and add button area
    document.getElementById("inputArea").style.display = "none";

    // Clear and show todos
    list.innerHTML = "";

    todos.forEach(function(todo,index){

        let li = document.createElement("li");
        li.style.fontSize="3rem";

        li.innerHTML = `
        ${todo}
        <div>
        <button class="edit">Edit</button>
        <button class="delete">Delete</button>
        </div>
        `;

        // DELETE
        li.querySelector(".delete").addEventListener("click", function(){
            todos.splice(index,1)
            showTodos()
        });

        // EDIT
        li.querySelector(".edit").addEventListener("click", function(){
            let newTodo = prompt("Edit Todo", todo);
            if(newTodo !== null && newTodo.trim() !== ""){
                todos[index] = newTodo
                showTodos()
            }
        });

        list.appendChild(li);
    });
}

let quotes = [
    "Believe in yourself.",
    "Stay focused and never give up.",
    "Small steps lead to big success.",
    "Work hard in silence.",
    "Dream big and act now."
];

function showQuote() {
    let random = Math.floor(Math.random() * quotes.length);
    document.getElementById("quote").innerText = "💡 " + quotes[random];
}

// Show a quote immediately
showQuote();

// Change quote every 10 seconds (10000 milliseconds)
setInterval(showQuote, 10000);



</script>

</body>
